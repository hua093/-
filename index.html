<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>響應式終極密碼</title>
    <style>
        /* --- 基礎樣式 (Mobile First) --- */
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            text-align: center;
            /* 手機版寬度 */
            width: 90%; 
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        h1 { font-size: 1.8rem; margin-bottom: 10px; }

        .range-box {
            background: #e74c3c;
            font-size: 2rem;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .message { height: 50px; margin-bottom: 20px; color: #f1c40f; font-weight: bold; }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            font-size: 1.2rem;
            border: none;
            border-radius: 8px;
            margin-bottom: 10px;
            box-sizing: border-box; /* 確保寬度包含 padding */
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-direction: column; /* 手機版按鈕直列 */
        }

        button {
            flex: 1;
            padding: 12px;
            font-size: 1.1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .guess-btn { background-color: #2ecc71; color: white; }
        .reset-btn { background-color: #95a5a6; color: white; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }

        /* --- 響應式設計 (Responsive Design) --- */
        
        /* 當螢幕寬度大於 600px (平板/電腦) */
        @media (min-width: 600px) {
            .container {
                padding: 40px;
                max-width: 500px;
            }
            h1 { font-size: 2.5rem; }
            .btn-group {
                flex-direction: row; /* 按鈕變橫列 */
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>終極密碼</h1>
    <div class="range-box" id="rangeText">1 < ? < 100</div>
    <div class="message" id="message">遊戲開始！請輸入數字</div>
    
    <input type="number" id="userInput" placeholder="輸入數字..." min="1" max="100">
    
    <div class="btn-group">
        <button class="guess-btn" onclick="checkGuess()">猜測</button>
        <button class="reset-btn" onclick="initGame()">重新開始</button>
    </div>
</div>

<script>
    let answer, min, max, isGameOver;

    function initGame() {
        answer = Math.floor(Math.random() * 98) + 2; // 2 ~ 99
        min = 1;
        max = 100;
        isGameOver = false;
        updateUI("遊戲開始！請輸入數字");
        document.getElementById('userInput').value = "";
        document.getElementById('userInput').disabled = false;
    }

    function updateUI(msg) {
        document.getElementById('rangeText').innerText = `${min} < ? < ${max}`;
        document.getElementById('message').innerText = msg;
    }

    function checkGuess() {
        if (isGameOver) return;

        const input = document.getElementById('userInput');
        const val = parseInt(input.value);

        if (isNaN(val) || val <= min || val >= max) {
            alert(`請輸入介於 ${min} 到 ${max} 之間的有效數字！`);
            return;
        }

        if (val === answer) {
            updateUI(`💥 砰！爆炸了！密碼就是 ${answer}`);
            isGameOver = true;
            input.disabled = true;
        } else if (val < answer) {
            min = val;
            updateUI("安全！再大一點...");
        } else {
            max = val;
            updateUI("安全！再小一點...");
        }
        input.value = "";
        input.focus();
    }

    // 初始化
    initGame();

    // 支援 Enter 鍵
    document.getElementById('userInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') checkGuess();
    });
</script>

</body>
</html>
